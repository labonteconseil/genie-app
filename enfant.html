<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Lumy — Génie Enfant</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#fff8f0">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #fff8f0;
      color: #2d2d2d;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #fff;
      border-bottom: 1.5px solid #ffd8a8;
      flex-shrink: 0;
    }
    .back-btn {
      font-size: 24px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
      line-height: 1;
      text-decoration: none;
    }
    .avatar {
      font-size: 34px;
      animation: bounce 1.8s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.1); }
    }
    .header-text h1 { font-size: 18px; font-weight: 800; }
    .header-text p  { font-size: 12px; color: #9e9e9e; margin-top: 2px; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Welcome */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      gap: 12px;
    }
    #welcome h2 { font-size: 22px; font-weight: 800; }
    #welcome p  { font-size: 14px; color: #9e9e9e; line-height: 1.6; }
    .suggest-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 380px;
      margin-top: 16px;
    }
    .suggest-btn {
      background: #fff;
      border: 1.5px solid #ffd8a8;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: background .15s;
      font-family: inherit;
      color: #2d2d2d;
    }
    .suggest-btn:hover { background: #fff0e0; }

    /* Bubbles */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.bot  { justify-content: flex-start; }
    .bot-avatar { font-size: 24px; flex-shrink: 0; margin-bottom: 2px; }
    .bubble {
      max-width: 72%;
      border-radius: 18px;
      padding: 12px 14px;
      font-size: 15px;
      line-height: 1.5;
    }
    .bubble-user { background: #ff8c42; color: #fff; border-bottom-right-radius: 4px; }
    .bubble-bot  { background: #e8f4fd; color: #2d2d2d; border-bottom-left-radius: 4px; }

    /* Typing */
    .typing-dots { display: flex; gap: 5px; padding: 4px 2px; }
    .dot {
      width: 8px; height: 8px;
      background: #ff8c42;
      border-radius: 50%;
      animation: dot-pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes dot-pulse {
      0%, 100% { opacity: .3; transform: scale(.8); }
      50%       { opacity: 1;  transform: scale(1.2); }
    }

    /* Input bar */
    #input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 10px 14px;
      background: #fff;
      border-top: 1.5px solid #ffd8a8;
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      background: #fff0e0;
      border: 1.5px solid #ffd8a8;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 15px;
      font-family: inherit;
      color: #2d2d2d;
      resize: none;
      max-height: 120px;
      outline: none;
    }
    #input::placeholder { color: #bbb; }
    #send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #ff8c42;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      transition: opacity .15s;
    }
    #send-btn:disabled { opacity: .4; cursor: default; }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">←</a>
  <div class="avatar">🌟</div>
  <div class="header-text">
    <h1>Lumy</h1>
    <p>Pose-moi n'importe quelle question !</p>
  </div>
</header>

<div id="welcome">
  <div style="font-size:56px">🌟</div>
  <h2>Bonjour ! Je suis Lumy !</h2>
  <p>Je connais plein de choses.<br>Qu'est-ce que tu veux savoir ?</p>
  <div class="suggest-grid">
    <button class="suggest-btn" onclick="sendMsg(this.textContent)">Pourquoi le ciel est bleu ? 🌤️</button>
    <button class="suggest-btn" onclick="sendMsg(this.textContent)">Comment vivaient les dinosaures ? 🦕</button>
    <button class="suggest-btn" onclick="sendMsg(this.textContent)">Combien font 7 × 8 ? 🔢</button>
    <button class="suggest-btn" onclick="sendMsg(this.textContent)">Pourquoi les étoiles brillent ? ⭐</button>
  </div>
</div>

<div id="messages" style="display:none"></div>

<div id="input-bar">
  <textarea id="input" placeholder="Pose ta question ici... 🙋" rows="1" maxlength="300"></textarea>
  <button id="send-btn" onclick="sendMsg()" disabled>➤</button>
</div>

<script>
  const API = window.location.hostname === 'localhost'
    ? 'http://localhost:3001/api/enfant/chat'
    : 'https://genie-app-server.up.railway.app/api/enfant/chat';
  const history = [];

  const welcomeEl  = document.getElementById('welcome');
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');

  inputEl.addEventListener('input', () => {
    sendBtn.disabled = !inputEl.value.trim();
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });

  function showChat() {
    welcomeEl.style.display = 'none';
    messagesEl.style.display = 'flex';
  }

  function addBubble(role, content) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    if (role === 'bot') {
      const av = document.createElement('span');
      av.className = 'bot-avatar';
      av.textContent = '🌟';
      row.appendChild(av);
    }
    const bub = document.createElement('div');
    bub.className = `bubble bubble-${role}`;
    bub.textContent = content;
    row.appendChild(bub);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bub;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typing';
    const av = document.createElement('span');
    av.className = 'bot-avatar';
    av.textContent = '🌟';
    row.appendChild(av);
    const bub = document.createElement('div');
    bub.className = 'bubble bubble-bot';
    bub.innerHTML = '<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    row.appendChild(bub);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMsg(text) {
    const msg = (text ?? inputEl.value).trim();
    if (!msg) return;

    showChat();
    addBubble('user', msg);
    history.push({ role: 'user', content: msg });

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    addTyping();

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      const reply = res.ok ? data.content : (data.error ?? 'Oups, erreur !');
      document.getElementById('typing')?.remove();
      addBubble('bot', reply);
      history.push({ role: 'assistant', content: reply });
    } catch {
      document.getElementById('typing')?.remove();
      addBubble('bot', 'Oups, je suis un peu fatigué 😴 Réessaie !');
    }
  }
</script>
</body>
</html>
